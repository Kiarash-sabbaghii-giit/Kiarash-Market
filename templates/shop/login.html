{% extends 'shop/base.html' %}
{% load static %}

{% block title %}ورود | KiarashMarket{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card-modern">
        <div class="auth-header-modern">
            <div class="auth-icon-modern">
                <i class="fas fa-rocket"></i>
            </div>
            <h2>خوش آمدی</h2>
            <p>برای ادامه وارد حساب خود شوید</p>
        </div>

        <form method="POST" class="auth-form-modern">
            {% csrf_token %}

            <div class="input-group-modern">
                <input type="text" name="first_name" id="first_name" required>
                <label>نام</label>
                <i class="fas fa-user input-icon-modern"></i>
            </div>

            <div class="input-group-modern">
                <input type="text" name="last_name" id="last_name" required>
                <label>نام خانوادگی</label>
                <i class="fas fa-user-friends input-icon-modern"></i>
            </div>

            <div class="input-group-modern">
                <input type="tel" name="phone" id="phone" required>
                <label>شماره همراه</label>
                <i class="fas fa-mobile-alt input-icon-modern"></i>
            </div>

            <button type="submit" class="auth-btn-modern">
                <span>ورود</span>
                <i class="fas fa-arrow-left"></i>
            </button>
        </form>

        <div class="auth-footer-modern">
            <span>حساب نداری؟</span>
            <a href="{% url 'register' %}">همین حالا ثبت‌نام کن</a>
        </div>

        <div class="auth-demo">
            <p></p>
        </div>
    </div>
</div>

<style>
    .auth-wrapper {
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 80px);
        padding: 2rem;
    }

    .auth-card-modern {
        background: rgba(15, 15, 25, 0.85);
        backdrop-filter: blur(20px);
        border-radius: 30px;
        padding: 2.5rem;
        width: 100%;
        max-width: 480px;
        border: 1px solid rgba(139, 92, 246, 0.3);
        box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        transition: all 0.3s ease;
    }

    .auth-card-modern:hover {
        border-color: rgba(139, 92, 246, 0.6);
        box-shadow: 0 25px 50px rgba(139, 92, 246, 0.1);
    }

    .auth-header-modern {
        text-align: center;
        margin-bottom: 2rem;
    }

    .auth-icon-modern {
        width: 75px;
        height: 75px;
        background: linear-gradient(135deg, #8b5cf6, #3b82f6);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1rem;
        font-size: 2rem;
        animation: float-icon 3s ease-in-out infinite;
    }

    @keyframes float-icon {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
    }

    .auth-header-modern h2 {
        font-size: 1.8rem;
        margin-bottom: 0.3rem;
        background: linear-gradient(135deg, #fff, #a855f7);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    .auth-header-modern p {
        color: rgba(255,255,255,0.5);
        font-size: 0.9rem;
    }

    .input-group-modern {
        position: relative;
        margin-bottom: 1.8rem;
    }

    .input-group-modern input {
        width: 100%;
        padding: 1rem 2.8rem 0.5rem 1rem;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(139, 92, 246, 0.3);
        border-radius: 15px;
        color: white;
        font-size: 1rem;
        outline: none;
        transition: all 0.3s ease;
        font-family: inherit;
    }

    .input-group-modern input:focus {
        border-color: #a855f7;
        box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
        background: rgba(255,255,255,0.08);
    }.input-group-modern label {
        position: absolute;
        right: 1rem;
        top: 1rem;
        color: rgba(255,255,255,0.5);
        transition: all 0.3s ease;
        pointer-events: none;
        font-size: 0.95rem;
    }

    .input-group-modern input:focus ~ label,
    .input-group-modern input:valid ~ label {
        top: -0.6rem;
        right: 0.8rem;
        font-size: 0.75rem;
        color: #a855f7;
        background: #0a0a0f;
        padding: 0 0.4rem;
    }

    .input-icon-modern {
        position: absolute;
        left: 1rem;
        bottom: 1rem;
        color: rgba(255,255,255,0.3);
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    .input-group-modern input:focus ~ .input-icon-modern {
        color: #a855f7;
    }

    .auth-btn-modern {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(135deg, #8b5cf6, #3b82f6);
        border: none;
        border-radius: 50px;
        color: white;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.8rem;
        transition: all 0.3s ease;
        margin-top: 0.5rem;
        position: relative;
        overflow: hidden;
    }

    .auth-btn-modern::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        transition: left 0.5s ease;
    }

    .auth-btn-modern:hover::before {
        left: 100%;
    }

    .auth-btn-modern:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4);
    }

    .auth-btn-modern:active {
        transform: translateY(0);
    }

    .auth-footer-modern {
        text-align: center;
        margin-top: 1.8rem;
        color: rgba(255,255,255,0.5);
        font-size: 0.9rem;
    }

    .auth-footer-modern a {
        color: #a855f7;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .auth-footer-modern a:hover {
        text-shadow: 0 0 10px #a855f7;
    }

    .auth-demo {
        text-align: center;
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid rgba(139, 92, 246, 0.2);
    }

    .auth-demo p {
        color: rgba(255,255,255,0.35);
        font-size: 0.75rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .auth-wrapper {
            padding: 1rem;
        }
        .auth-card-modern {
            padding: 1.8rem;
        }
        .auth-header-modern h2 {
            font-size: 1.5rem;
        }
        .auth-icon-modern {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
        }
    }

    /* Animation for form */
    .auth-card-modern {
        animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Input animation delay */
    .input-group-modern:nth-child(1) { animation: fadeInInput 0.4s ease-out 0.1s both; }
    .input-group-modern:nth-child(2) { animation: fadeInInput 0.4s ease-out 0.2s both; }
    .input-group-modern:nth-child(3) { animation: fadeInInput 0.4s ease-out 0.3s both; }

    @keyframes fadeInInput {
        from {
            opacity: 0;
            transform: translateX(-10px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }
</style>

<script>
    // Auto-focus on first input
    document.addEventListener('DOMContentLoaded', function() {
        const firstInput = document.querySelector('.input-group-modern input');
        if (firstInput) {
            firstInput.focus();
        }
    });

    // Add ripple effect to button
    const btn = document.querySelector('.auth-btn-modern');
    if (btn) {
        btn.addEventListener('click', function(e) {
            let ripple = document.createElement('span');
            ripple.classList.add('ripple');
            this.appendChild(ripple);

            let x = e.clientX - e.target.offsetLeft;
            let y = e.clientY - e.target.offsetTop;

            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';

            setTimeout(() => {
                ripple.remove();
            }, 600);
        });
    }
</script>

<style>
    /* Ripple effect */
    .auth-btn-modern {
        position: relative;
        overflow: hidden;
    }

    .ripple {
        position: absolute;
        border-radius: 50%;
        background: rgba(255,255,255,0.5);
        transform: scale(0);
        animation: ripple-animation 0.6s linear;
        pointer-events: none;
        width: 100px;
        height: 100px;
        margin-left: -50px;
        margin-top: -50px;
    }

    @keyframes ripple-animation {
        from {
            transform: scale(0);
            opacity: 1;
        }
        to {
            transform: scale(4);
            opacity: 0;
        }
    }
</style>
{% endblock %}
